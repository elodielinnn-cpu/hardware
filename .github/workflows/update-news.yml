name: Update news data

on:
  workflow_dispatch:
  schedule:
    # 00:05 UTC = 08:05 Asia/Shanghai. GitHub scheduled jobs can start a few minutes late.
    - cron: "5 0 * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest news
        run: node scripts/fetch_real_sources.mjs

      - name: Validate generated data
        run: node scripts/validate_generated_data.mjs

      - name: Sync static publish directory
        run: |
          cp real-data.js taxonomy.js site/

      - name: Bust static asset cache
        run: node scripts/update_asset_versions.mjs

      - name: Commit updated data
        run: |
          if git diff --quiet; then
            echo "No news data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add real-data.js taxonomy.js index.html site/real-data.js site/taxonomy.js site/index.html
          git commit -m "Update news data"
          git push
